<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HopeGoo Flight Mystery Box</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a1a; color: #fff; min-height: 100vh; overflow-x: hidden; }

/* ===== 页面容器 ===== */
.page { display: none; min-height: 100vh; padding: 0 20px 40px; }
.page.active { display: flex; flex-direction: column; animation: fadeIn .4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ===== 顶部导航 ===== */
.top-bar { display: flex; align-items: center; padding: 16px 0; position: sticky; top: 0; z-index: 10; background: linear-gradient(to bottom, #0a0a1a 60%, transparent); }
.back-btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.1); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
.top-title { flex: 1; text-align: center; font-size: 16px; font-weight: 600; }

/* ===== 语言切换 ===== */
.lang-switch { position: fixed; top: 16px; right: 16px; z-index: 100; display: flex; gap: 4px; background: rgba(255,255,255,.08); padding: 4px; border-radius: 20px; backdrop-filter: blur(10px); }
.lang-btn { padding: 6px 12px; border: none; background: transparent; color: rgba(255,255,255,.5); font-size: 12px; font-weight: 600; border-radius: 16px; cursor: pointer; transition: all .2s; }
.lang-btn.active { background: rgba(255,255,255,.15); color: #fff; }

/* ===== 首页 ===== */
.hero { text-align: center; padding-top: 16px; }
.logo { font-size: 24px; font-weight: 800; letter-spacing: 2px; background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 4px; }
.tagline { color: rgba(255,255,255,.6); font-size: 13px; margin-bottom: 16px; }

.blind-box-visual { width: 100px; height: 100px; margin: 0 auto 12px; position: relative; cursor: pointer; }
.box-body { width: 100px; height: 80px; background: linear-gradient(145deg, #ff6b6b, #ee5a24); border-radius: 12px; position: absolute; bottom: 0; display: flex; align-items: center; justify-content: center; box-shadow: 0 16px 40px rgba(255,107,107,.3); }
.box-body::after { content: '?'; font-size: 36px; font-weight: 900; color: rgba(255,255,255,.9); }
.box-lid { width: 110px; height: 26px; background: linear-gradient(145deg, #ff8a5c, #ff6348); border-radius: 8px 8px 3px 3px; position: absolute; top: 0; left: -5px; box-shadow: 0 -3px 15px rgba(255,99,72,.3); transition: transform .6s cubic-bezier(.68,-.55,.27,1.55); transform-origin: left bottom; }
.blind-box-visual:hover .box-lid, .blind-box-visual.opening .box-lid { transform: rotateZ(-30deg) translateY(-14px); }
.box-ribbon { width: 16px; height: 100%; background: linear-gradient(180deg, #ffd93d, #f9ca24); position: absolute; left: 50%; transform: translateX(-50%); border-radius: 0 0 6px 6px; }

.price-tag { font-size: 28px; font-weight: 900; margin-bottom: 2px; }
.price-tag span { font-size: 14px; font-weight: 400; color: rgba(255,255,255,.6); }
.original-price { color: rgba(255,255,255,.3); text-decoration: line-through; font-size: 12px; margin-bottom: 12px; }

/* ===== 规则说明 ===== */
.rules-section { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 10px; margin: 12px 0; text-align: left; }
.rules-title { font-size: 12px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
.rules-list { font-size: 11px; color: rgba(255,255,255,.6); line-height: 1.6; padding-left: 0; list-style: none; }
.rules-list li { margin-bottom: 4px; padding-left: 12px; position: relative; }
.rules-list li::before { content: '•'; position: absolute; left: 0; color: #ff6348; }
.rules-highlight { color: #ffd93d; font-weight: 600; }
.rules-tag { display: inline-block; background: rgba(107,203,119,.15); color: #6bcb77; padding: 1px 4px; border-radius: 3px; font-size: 10px; margin-left: 2px; }

/* ===== 出发地列表 ===== */
.departure-section { margin: 12px 0; }
.departure-title { font-size: 11px; color: rgba(255,255,255,.5); margin-bottom: 6px; }
.departure-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.departure-tag { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); padding: 2px 6px; border-radius: 4px; font-size: 10px; color: rgba(255,255,255,.5); }
.departure-tag span { color: rgba(255,255,255,.8); font-weight: 600; }

/* ===== 按钮 ===== */
.btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; }
.btn:active { transform: scale(.97); }
.btn-primary { background: linear-gradient(135deg, #ff6b6b, #ff6348); color: #fff; box-shadow: 0 8px 30px rgba(255,99,72,.35); }
.btn-secondary { background: rgba(255,255,255,.08); color: #fff; border: 1px solid rgba(255,255,255,.15); }
.btn-group { background: linear-gradient(135deg, #6bcb77, #4d96ff); color: #fff; box-shadow: 0 8px 30px rgba(77,150,255,.35); }
.btn-reroll { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; box-shadow: 0 8px 30px rgba(124,58,237,.3); }
.btn-sm { padding: 10px 20px; width: auto; font-size: 14px; border-radius: 10px; }
.btn:disabled { opacity: .4; pointer-events: none; }
.btn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: auto; padding-top: 20px; }

/* ===== 模式选择 ===== */
.mode-cards { display: flex; flex-direction: column; gap: 16px; margin: 32px 0; }
.mode-card { background: rgba(255,255,255,.05); border: 2px solid rgba(255,255,255,.08); border-radius: 20px; padding: 24px; cursor: pointer; transition: all .3s; }
.mode-card.selected { border-color: #ff6348; background: rgba(255,99,72,.08); }
.mode-card:active { transform: scale(.98); }
.mode-icon { font-size: 36px; margin-bottom: 12px; }
.mode-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.mode-desc { font-size: 13px; color: rgba(255,255,255,.5); line-height: 1.5; }
.mode-badge { display: inline-block; background: linear-gradient(135deg, #6bcb77, #4d96ff); padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; margin-left: 6px; }

/* ===== 表单 ===== */
.form-section { margin-bottom: 24px; }
.form-label { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 8px; display: block; }
.form-input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 12px; color: #fff; font-size: 15px; outline: none; transition: border-color .2s; }
.form-input:focus { border-color: #ff6348; }
.form-input::placeholder { color: rgba(255,255,255,.25); }
.form-row { display: flex; gap: 12px; }
.form-row .form-group { flex: 1; }
.form-group { margin-bottom: 16px; }
.form-hint { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 6px; }

/* ===== 搜索输入框 ===== */
.search-container { position: relative; }
.search-results { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a3e; border: 1px solid rgba(255,255,255,.1); border-radius: 12px; margin-top: 4px; max-height: 240px; overflow-y: auto; z-index: 20; display: none; }
.search-results.show { display: block; }
.search-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background .2s; }
.search-item:hover, .search-item.selected { background: rgba(255,255,255,.08); }
.search-item-code { font-size: 16px; font-weight: 700; width: 48px; }
.search-item-city { font-size: 13px; color: rgba(255,255,255,.6); }
.search-item-region { font-size: 11px; color: rgba(255,255,255,.3); margin-left: auto; }
.selected-airport-display { background: rgba(255,99,72,.1); border: 1px solid rgba(255,99,72,.3); border-radius: 10px; padding: 12px; margin-top: 8px; display: none; }
.selected-airport-display.show { display: flex; align-items: center; gap: 12px; }
.selected-airport-code { font-size: 20px; font-weight: 800; color: #ff6348; }
.selected-airport-city { font-size: 13px; color: rgba(255,255,255,.6); }
.selected-airport-change { margin-left: auto; color: rgba(255,255,255,.4); font-size: 12px; cursor: pointer; }

/* ===== 拼团页 ===== */
.group-header { text-align: center; padding: 40px 0 24px; }
.group-icon { font-size: 64px; margin-bottom: 16px; }
.group-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.group-subtitle { font-size: 14px; color: rgba(255,255,255,.5); }
.member-list { margin: 20px 0; }
.member-item { display: flex; align-items: center; gap: 12px; padding: 14px 16px; background: rgba(255,255,255,.04); border-radius: 14px; margin-bottom: 8px; }
.member-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #ff6b6b, #ffd93d); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
.member-info { flex: 1; }
.member-name { font-size: 14px; font-weight: 600; }
.member-detail { font-size: 12px; color: rgba(255,255,255,.4); }
.member-status { font-size: 12px; padding: 4px 10px; border-radius: 8px; font-weight: 600; }
.status-paid { background: rgba(107,203,119,.15); color: #6bcb77; }
.status-waiting { background: rgba(255,217,61,.15); color: #ffd93d; }
.status-you { background: rgba(255,107,107,.15); color: #ff6b6b; }

.invite-link-box { background: rgba(255,255,255,.06); border-radius: 14px; padding: 16px; margin: 16px 0; display: flex; align-items: center; gap: 12px; }
.invite-link-text { flex: 1; font-size: 13px; color: rgba(255,255,255,.5); word-break: break-all; }
.copy-btn { padding: 8px 14px; background: rgba(255,255,255,.1); border: none; border-radius: 8px; color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap; }

.progress-bar { height: 6px; background: rgba(255,255,255,.08); border-radius: 3px; margin: 16px 0; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #6bcb77, #4d96ff); border-radius: 3px; transition: width .6s ease; }

/* ===== 地图 ===== */
.map-container { width: 100%; max-width: 400px; margin: 0 auto; position: relative; }
.map-svg { width: 100%; height: auto; }
.map-state { fill: rgba(255,255,255,.08); stroke: rgba(255,255,255,.15); stroke-width: 0.5; transition: fill .3s; }
.us-outline { fill: #eaf1fb; stroke: #a9bfd8; stroke-width: 1; transition: fill .3s; filter: drop-shadow(0 6px 20px rgba(77,150,255,.28)); }
.us-divider { fill: none; stroke: #c4d4ea; stroke-width: .6; opacity: .7; }
.flight-path { fill: none; stroke: #4d96ff; stroke-width: 2.5; stroke-linecap: round; filter: drop-shadow(0 0 6px rgba(77,150,255,.6)); }
.destination-dot { cursor: pointer; transition: transform .2s; }
.destination-label { font-size: 9px; font-weight: 700; fill: #2f3a52; paint-order: stroke; stroke: #ffffff; stroke-width: 2.4px; stroke-linejoin: round; pointer-events: none; }
#origin-label { paint-order: stroke; stroke: #ffffff; stroke-width: 2.4px; stroke-linejoin: round; }

.reveal-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; }
.reveal-map-box { width: 100%; max-width: 380px; margin-bottom: 32px; position: relative; }
.reveal-destination { margin-top: 20px; opacity: 0; transition: opacity .5s; }
.reveal-destination.show { opacity: 1; }
.reveal-dest-code { font-size: 48px; font-weight: 900; color: #ffd93d; }
.reveal-dest-city { font-size: 16px; color: rgba(255,255,255,.6); margin-top: 4px; }

@keyframes confetti-fall { 0% { transform: translateY(-10vh) rotate(0); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
.confetti { position: fixed; width: 8px; height: 8px; border-radius: 2px; top: 0; animation: confetti-fall 2.5s ease-in forwards; pointer-events: none; z-index: 100; }

/* ===== 结果页 ===== */
.result-card { background: linear-gradient(145deg, #1a1a3e, #2a2a5e); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 24px; margin: 16px 0; }
.result-route { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 20px; }
.result-airport { font-size: 28px; font-weight: 900; }
.result-arrow { font-size: 20px; color: rgba(255,255,255,.3); }
.result-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.result-item { background: rgba(255,255,255,.04); border-radius: 12px; padding: 12px; }
.result-item-label { font-size: 11px; color: rgba(255,255,255,.35); margin-bottom: 4px; }
.result-item-value { font-size: 14px; font-weight: 600; }
.tax-highlight { color: #ffd93d; }
.group-members-result { margin-top: 16px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,.08); }
.group-member-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 13px; }
.group-member-dot { width: 8px; height: 8px; border-radius: 50%; }
.group-member-name { flex: 1; color: rgba(255,255,255,.6); }
.group-member-route { color: rgba(255,255,255,.4); font-size: 12px; }

/* ===== 选项页 ===== */
.option-cards { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
.option-card { background: rgba(255,255,255,.05); border: 2px solid rgba(255,255,255,.08); border-radius: 16px; padding: 20px; cursor: pointer; transition: all .2s; }
.option-card:active { transform: scale(.98); }
.option-card.option-a { border-color: rgba(107,203,119,.3); }
.option-card.option-b { border-color: rgba(168,85,247,.3); }
.option-card.option-c { border-color: rgba(255,217,61,.3); }
.option-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
.option-desc { font-size: 13px; color: rgba(255,255,255,.45); line-height: 1.5; }

/* ===== 确认页 ===== */
.confirm-card { background: linear-gradient(145deg, #1a3e1a, #1a3e2a); border: 1px solid rgba(107,203,119,.2); border-radius: 20px; padding: 24px; text-align: center; margin: 24px 0; }
.confirm-icon { font-size: 56px; margin-bottom: 12px; }
.confirm-title { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
.confirm-desc { font-size: 14px; color: rgba(255,255,255,.5); line-height: 1.6; }

/* ===== Re-roll ===== */
.reroll-progress { background: rgba(255,255,255,.06); border-radius: 16px; padding: 20px; margin: 16px 0; text-align: center; }
.reroll-count { font-size: 48px; font-weight: 900; color: #a855f7; }
.reroll-target { font-size: 14px; color: rgba(255,255,255,.4); margin-top: 4px; }
.reroll-link-box { background: rgba(168,85,247,.08); border: 1px dashed rgba(168,85,247,.4); border-radius: 14px; padding: 16px; margin: 16px 0; display: flex; align-items: center; gap: 12px; }
.reroll-link-text { flex: 1; font-size: 12px; color: rgba(255,255,255,.4); word-break: break-all; }

/* ===== 代金券 ===== */
.voucher-card { background: linear-gradient(145deg, #3e3a1a, #3e351a); border: 2px solid rgba(255,217,61,.2); border-radius: 20px; padding: 32px 24px; text-align: center; margin: 24px 0; position: relative; overflow: hidden; }
.voucher-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #ffd93d, #f9ca24); }
.voucher-amount { font-size: 52px; font-weight: 900; color: #ffd93d; margin: 16px 0 8px; }
.voucher-amount span { font-size: 24px; }
.voucher-label { font-size: 14px; color: rgba(255,255,255,.5); }
.voucher-expiry { font-size: 12px; color: rgba(255,255,255,.3); margin-top: 12px; }

/* ===== Toast ===== */
.toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(255,255,255,.95); color: #1a1a2e; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 600; z-index: 200; opacity: 0; transition: all .3s; pointer-events: none; box-shadow: 0 8px 30px rgba(0,0,0,.3); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== 底部说明 ===== */
.terms { font-size: 11px; color: rgba(255,255,255,.2); text-align: center; margin-top: 24px; line-height: 1.6; }

/* ===== 倒计时 ===== */
.countdown { font-size: 13px; color: rgba(255,255,255,.35); text-align: center; margin: 8px 0; }
.countdown span { color: #ff6348; font-weight: 700; }
</style>
</head>
<body>

<!-- 语言切换 -->
<div class="lang-switch">
  <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh')">中文</button>
  <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- ======== 第1页：首页 ======== -->
<div class="page active" id="page-home">
  <div class="hero">
    <div class="logo">HopeGoo</div>
    <div class="tagline" data-i18n="home.tagline"></div>
    <div class="blind-box-visual" onclick="goPage('page-mode')">
      <div class="box-lid"><div class="box-ribbon"></div></div>
      <div class="box-body"></div>
    </div>
    <div class="price-tag">$29.99 <span data-i18n="home.perBox"></span></div>

    <!-- 规则说明 -->
    <div class="rules-section">
      <div class="rules-title" data-i18n="home.rulesTitle"></div>
      <ul class="rules-list" id="rules-list"></ul>
    </div>

    <!-- 出发地列表 -->
    <div class="departure-section">
      <div class="departure-title" data-i18n="home.departureTitle"></div>
      <div class="departure-grid" id="departure-grid"></div>
    </div>
  </div>
  <div class="btn-stack">
    <button class="btn btn-primary" onclick="goPage('page-mode')" data-i18n="home.buyBtn"></button>
  </div>
  <div class="terms" data-i18n="home.terms"></div>
</div>

<!-- ======== 第2页：模式选择 ======== -->
<div class="page" id="page-mode">
  <div class="top-bar">
    <button class="back-btn" onclick="goPage('page-home')">←</button>
    <div class="top-title" data-i18n="mode.title"></div>
  </div>
  <div class="mode-cards">
    <div class="mode-card selected" onclick="selectMode(this, 'solo')">
      <div class="mode-icon">🎒</div>
      <div class="mode-name" data-i18n="mode.soloTitle"></div>
      <div class="mode-desc" data-i18n="mode.soloDesc"></div>
    </div>
    <div class="mode-card" onclick="selectMode(this, 'group')">
      <div class="mode-icon">👯</div>
      <div class="mode-name"><span data-i18n="mode.groupTitle"></span> <span class="mode-badge" data-i18n="mode.groupBadge"></span></div>
      <div class="mode-desc" data-i18n="mode.groupDesc"></div>
    </div>
  </div>
  <div class="btn-stack">
    <button class="btn btn-primary" onclick="nextFromMode()" data-i18n="common.next"></button>
  </div>
</div>

<!-- ======== 第3页：填写信息（单人） ======== -->
<div class="page" id="page-form-solo">
  <div class="top-bar">
    <button class="back-btn" onclick="goPage('page-mode')">←</button>
    <div class="top-title" data-i18n="form.title"></div>
  </div>
  <div class="form-section">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label" data-i18n="form.firstName"></label>
        <input class="form-input" id="solo-firstname" data-i18n-placeholder="form.firstNamePH">
      </div>
      <div class="form-group">
        <label class="form-label" data-i18n="form.lastName"></label>
        <input class="form-input" id="solo-lastname" data-i18n-placeholder="form.lastNamePH">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="form.birthday"></label>
      <input class="form-input" id="solo-birthday" type="date">
      <div class="form-hint" data-i18n="form.dateFormat"></div>
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="form.departure"></label>
      <div class="search-container">
        <input class="form-input" id="solo-airport-search" data-i18n-placeholder="form.searchPH" oninput="filterAirports('solo')" onfocus="showAirportResults('solo')">
        <div class="search-results" id="solo-airport-results"></div>
      </div>
      <div class="selected-airport-display" id="solo-selected-airport">
        <span class="selected-airport-code" id="solo-selected-code"></span>
        <span class="selected-airport-city" id="solo-selected-city"></span>
        <span class="selected-airport-change" data-i18n="form.change" onclick="clearAirport('solo')"></span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="form.departureDate"></label>
      <input class="form-input" id="solo-date" type="date">
      <div class="form-hint" data-i18n="form.dateHint"></div>
    </div>
    <div class="form-group">
      <label class="form-label" data-i18n="form.passport"></label>
      <input class="form-input" id="solo-passport" data-i18n-placeholder="form.passportPH">
      <div class="form-hint" data-i18n="form.passportHint"></div>
    </div>
  </div>
  <div class="btn-stack">
    <button class="btn btn-primary" onclick="submitSoloForm()" data-i18n="form.payAndOpen"></button>
  </div>
</div>

<!-- ======== 第4页：填写信息（拼团） ======== -->
<div class="page" id="page-form-group">
  <div class="top-bar">
    <button class="back-btn" onclick="goPage('page-mode')">←</button>
    <div class="top-title" data-i18n="group.createTitle"></div>
  </div>

  // ===== 获取文本 =====
  get(key, vars = {}) {
    let text = this[this.currentLang]?.[key] || this.zh[key] || key;
    // 替换变量 {name} -> vars.name
    Object.keys(vars).forEach(k => {
      text = text.replace(new RegExp(`\\{${k}\\}`, 'g'), vars[k]);
    });
    return text;
  },

  // ===== 应用语言 =====
  apply() {
    // 文本内容
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      el.textContent = this.get(key);
    });

    // placeholder
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      el.placeholder = this.get(key);
    });

    // 特殊处理：规则列表
    const rulesList = document.getElementById('rules-list');
    if (rulesList) {

    // 更新语言按钮状态
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === this.currentLang);
    });

    // 更新 html lang 属性
    document.documentElement.lang = this.currentLang === 'zh' ? 'zh-CN' : 'en';
  }
};

  const query = document.getElementById(`${mode}-airport-search`).value.toLowerCase();

  const filtered = airports.filter(ap => {
    const searchStr = `${ap.code} ${ap.cityZh} ${ap.cityEn} ${ap.regionZh} ${ap.regionEn}`.toLowerCase();
    return searchStr.includes(query);

  resultsContainer.innerHTML = filtered.length ? filtered.map(ap => {

      <span class="search-item-city">${city}</span>

  state.groupMembers.push({

    paid: true, isLeader: false,
  });
  showToast(i18n.get('toast.memberJoined', { name }));
  renderGroupWait();
}

    const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('group-timer').textContent = `${h}:${m}:${s}`;
  }, 1000);

function startMapAnimation() {
  document.getElementById('us-map').onclick = null;
  document.getElementById('reveal-label').textContent = i18n.get('reveal.drawing');

  const dartMarker = document.getElementById('dart-marker');
  dartMarker.style.display = 'block';

  const finalDest = randomFrom(destinations);
  let jumps = 0;
  const maxJumps = 12;

  const jumpInterval = setInterval(() => {
    const randomDest = randomFrom(destinations);
    dartMarker.setAttribute('transform', `translate(${randomDest.x}, ${randomDest.y})`);

    document.querySelectorAll('.destination-dot circle').forEach(c => {
      c.setAttribute('fill', '#7d93b3');
    });
    const currentDot = document.querySelector(`.destination-dot[data-index="${destinations.indexOf(randomDest)}"] circle`);
    if (currentDot) currentDot.setAttribute('fill', '#ffb703');

    jumps++;
    if (jumps >= maxJumps) {
      clearInterval(jumpInterval);
      dartMarker.setAttribute('transform', `translate(${finalDest.x}, ${finalDest.y})`);

      document.querySelectorAll('.destination-dot circle').forEach(c => {
        c.setAttribute('fill', '#7d93b3');
      });
      const finalDot = document.querySelector(`.destination-dot[data-index="${destinations.indexOf(finalDest)}"] circle`);
      if (finalDot) finalDot.setAttribute('fill', '#ff6348');

      state.destination = finalDest;

      // 针落下后，用飞行动画连接出发机场与目的地
      setTimeout(() => flyToDestination(finalDest), 350);
    }
  }, 150);
}

// 飞行动画：从用户选择的出发机场画弧线飞到目的地
function flyToDestination(dest) {
  const originCode = state.selectedAirport[state.mode];
  const origin = airportCoords[originCode];

  // 若缺少坐标（理论上不会），直接显示结果兜底
  if (!origin) { revealDestination(dest); return; }

  // 1) 标记出发机场
  const originG = document.getElementById('origin-marker');
  const originCity = i18n.currentLang === 'zh' ? origin.cityZh : origin.cityEn;
  originG.innerHTML = `
    <circle cx="${origin.x}" cy="${origin.y}" r="5.5" fill="#4d96ff" stroke="#fff" stroke-width="1.6"/>
    <text x="${origin.x}" y="${origin.y - 10}" text-anchor="middle" id="origin-label" font-size="9" font-weight="700" fill="#1f6fd8">${originCode}</text>`;

  // 2) 生成弧线（二次贝塞尔，控制点向上偏移制造弧高）
  const midX = (origin.x + dest.x) / 2;
  const midY = (origin.y + dest.y) / 2;
  const dist = Math.hypot(dest.x - origin.x, dest.y - origin.y);
  const arcH = Math.max(60, dist * 0.35); // 弧高随距离增长
  const ctrlX = midX;
  const ctrlY = Math.min(midY, origin.y, dest.y) - arcH;
  const pathD = `M ${origin.x} ${origin.y} Q ${ctrlX} ${ctrlY} ${dest.x} ${dest.y}`;

  const fp = document.getElementById('flight-path');
  fp.setAttribute('d', pathD);
  fp.style.transition = 'none';
  fp.style.strokeDasharray = fp.getTotalLength();
  fp.style.strokeDashoffset = fp.getTotalLength();
  fp.setAttribute('opacity', '1');
  // 触发重绘后再加过渡，让航线逐步画出
  requestAnimationFrame(() => {
    fp.style.transition = 'stroke-dashoffset 1.1s ease-in-out';
    fp.style.strokeDashoffset = '0';
  });

  // 3) 飞机沿弧线飞行（基于 path 采样定位）
  const plane = document.getElementById('flight-plane');
  plane.setAttribute('opacity', '1');
  const duration = 1400;
  const startT = performance.now();
  const len = fp.getTotalLength();
  plane.style.transition = 'none';

  function step(now) {
    const t = Math.min((now - startT) / duration, 1);
    const p = fp.getPointAtLength(len * t);
    // 计算切线方向以旋转飞机
    const ahead = fp.getPointAtLength(Math.min(len * (t + 0.01), len));
    const angle = Math.atan2(ahead.y - p.y, ahead.x - p.x) * 180 / Math.PI;
    plane.setAttribute('x', p.x);
    plane.setAttribute('y', p.y);
    plane.setAttribute('text-anchor', 'middle');
    plane.style.dominantBaseline = 'central';
    plane.setAttribute('transform', `rotate(${angle} ${p.x} ${p.y})`);
    if (t < 1) {
      requestAnimationFrame(step);
    } else {
      revealDestination(dest);
    }
  }
  requestAnimationFrame(step);
}

// 显示抽取结果 + 彩带
function revealDestination(dest) {
  const city = i18n.currentLang === 'zh' ? dest.cityZh : dest.cityEn;
  document.getElementById('reveal-code').textContent = dest.code;
  document.getElementById('reveal-city').textContent = `${dest.emoji} ${city}`;
  document.getElementById('reveal-destination').classList.add('show');
  document.getElementById('reveal-label').style.display = 'none';
  document.getElementById('reveal-next-btn').style.display = 'flex';
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#a855f7','#ff8a5c','#f9ca24'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * .5 + 's';
    c.style.animationDuration = (2 + Math.random() * 1.5) + 's';
    c.style.width = (4 + Math.random() * 8) + 'px';
    c.style.height = (4 + Math.random() * 8) + 'px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// ============================================================
// 结果页
// ============================================================
function showResult() {
  const dest = state.destination;
  const isGroup = state.groupMembers.length > 1;

  const departureAirport = isGroup ? state.selectedAirport.group || 'LAX' : state.selectedAirport.solo || 'SFO';
  const dateVal = isGroup
    ? document.getElementById('group-date').value || '2026-06-15'
    : document.getElementById('solo-date').value || '2026-06-15';
  const flightNum = randomFrom(['AA','UA','DL','WN','B6','AS']) + (100 + Math.floor(Math.random() * 900));
  const depTime = `${6 + Math.floor(Math.random() * 14)}:${String(Math.floor(Math.random() * 6) * 10).padStart(2, '0')}`;
  const arrTime = `${8 + Math.floor(Math.random() * 14)}:${String(Math.floor(Math.random() * 6) * 10).padStart(2, '0')}`;
  const destCity = i18n.currentLang === 'zh' ? dest.cityZh : dest.cityEn;

  let html = `
    <div class="result-route">
      <div class="result-airport">${departureAirport}</div>
      <div class="result-arrow">✈️ →</div>
      <div class="result-airport" style="color:#ffd93d;">${dest.code}</div>
    </div>
    <div class="result-detail">
      <div class="result-item"><div class="result-item-label">${i18n.get('result.destination')}</div><div class="result-item-value">${dest.emoji} ${destCity}</div></div>
      <div class="result-item"><div class="result-item-label">${i18n.get('result.departureDate')}</div><div class="result-item-value">${dateVal}</div></div>
      <div class="result-item"><div class="result-item-label">${i18n.get('result.flight')}</div><div class="result-item-value">${flightNum}</div></div>
      <div class="result-item"><div class="result-item-label">${i18n.get('result.time')}</div><div class="result-item-value">${depTime} - ${arrTime}</div></div>
    </div>`;

  if (isGroup && state.groupMembers.length > 1) {
    html += `<div class="group-members-result"><div style="font-size:12px;color:rgba(255,255,255,.3);margin-bottom:8px;">${i18n.get('result.groupMembers')}</div>`;
    const dotColors = ['#ff6b6b','#6bcb77','#4d96ff','#ffd93d','#a855f7'];
    state.groupMembers.forEach((m, i) => {
      html += `<div class="group-member-row">
        <div class="group-member-dot" style="background:${dotColors[i % dotColors.length]}"></div>
        <div class="group-member-name">${m.name} ${m.isLeader ? '👑' : ''}</div>
        <div class="group-member-route">${m.airport} → ${dest.code}</div>
      </div>`;
    });
    html += `</div>`;
  }

  document.getElementById('result-card').innerHTML = html;

  // 选项描述
  document.getElementById('option-a-desc').textContent = isGroup
    ? i18n.get('option.a.descGroup')
    : i18n.get('option.a.desc');

  document.getElementById('option-b-desc').textContent = isGroup
    ? i18n.get('option.b.descGroup', { n: state.groupMembers.length + 1 })
    : i18n.get('option.b.desc');

  document.getElementById('result-countdown').innerHTML = i18n.get('result.countdown');
  state.rerollNeeded = isGroup ? state.groupMembers.length + 1 : 2;

  goPage('page-result');
}

// ============================================================
// 选择选项
// ============================================================
function chooseOption(opt) {
  if (opt === 'a') {
    document.getElementById('confirm-a-detail').innerHTML = i18n.get('confirm.detail');
    goPage('page-confirm-a');
  } else if (opt === 'b') {
    if (state.rerollCount >= state.maxReroll) return showToast(i18n.get('toast.rerollUsedUp'));
    state.rerollInvited = 0;
    const isGroup = state.groupMembers.length > 1;
    state.rerollNeeded = isGroup ? state.groupMembers.length + 1 : 2;

    document.getElementById('reroll-rule-text').textContent = isGroup
      ? i18n.get('reroll.ruleTextGroup', { n: state.rerollNeeded })
      : i18n.get('reroll.ruleText', { n: state.rerollNeeded });

    document.getElementById('reroll-current').textContent = '0';
    document.getElementById('reroll-target-text').textContent = i18n.get('reroll.newUsers', { n: state.rerollNeeded });
    document.getElementById('reroll-progress-bar').style.width = '0%';
    document.getElementById('reroll-remaining-text').textContent = i18n.get('reroll.remaining', { n: state.maxReroll - state.rerollCount });

    const btn = document.getElementById('btn-do-reroll');
    btn.disabled = true;
    btn.textContent = i18n.get('reroll.incomplete');
    goPage('page-reroll');
  } else if (opt === 'c') {
    goPage('page-voucher');
  }
}

// ============================================================
// Re-roll
// ============================================================
function simulateRerollInvite() {
  state.rerollInvited++;
  const pct = Math.min((state.rerollInvited / state.rerollNeeded) * 100, 100);
  document.getElementById('reroll-current').textContent = state.rerollInvited;
  document.getElementById('reroll-progress-bar').style.width = pct + '%';

  if (state.rerollInvited >= state.rerollNeeded) {
    const btn = document.getElementById('btn-do-reroll');
    btn.disabled = false;
    btn.textContent = i18n.get('reroll.doReroll');
    btn.onclick = doReroll;
    showToast(i18n.get('toast.rerollComplete'));
  } else {
    showToast(i18n.get('toast.rerollProgress', { current: state.rerollInvited, total: state.rerollNeeded }));
  }
}

function doReroll() {
  state.rerollCount++;
  state.destination = randomFrom(destinations);
  showToast(i18n.get('toast.rerollSuccess'));
  goPage('page-reveal');
}

// ============================================================
// 初始化
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  const minDate = new Date();
  minDate.setDate(minDate.getDate() + 14);
  const minStr = minDate.toISOString().split('T')[0];
  document.getElementById('solo-date').min = minStr;
  document.getElementById('group-date').min = minStr;

  // 应用初始语言
  i18n.apply();
});
</script>
